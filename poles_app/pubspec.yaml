name: poles
description: "Poles — barcode-scanning puzzle adventure."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.4.3+1
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2
  logger: ^2.4.0
  pretty_dio_logger: ^1.3.1

  mobile_scanner: ^5.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  sentry_flutter: ^9.9.1
  sentry: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.local
