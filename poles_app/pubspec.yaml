name: poles
description: "Poles — barcode-scanning puzzle adventure."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.4.3+1
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2
  logger: ^2.4.0
  pretty_dio_logger: ^1.3.1

  mobile_scanner: ^5.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  sentry_flutter: ^9.9.1
  sentry: any

  phoenix_socket: ^0.7.5

  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  nfc_manager: ^3.5.0

  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http_mock_adapter: ^0.6.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true
  android: "ic_launcher"
  adaptive_icon_background: "#3949AB"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.local
